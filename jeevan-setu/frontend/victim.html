<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeevan Setu - Victim Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">Jeevan Setu</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Victim Portal</a></li>
          <li class="nav-item"><span class="nav-link" id="userInfo">Welcome, User</span></li>
          <li class="nav-item"><button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <h2 class="mb-4 text-center">Submit an Emergency Request</h2>
      <form id="emergencyForm" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Full Name *</label>
          <input type="text" id="victimName" class="form-control" placeholder="Your Name" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Contact Number *</label>
          <input type="tel" id="victimContact" class="form-control" placeholder="Phone Number" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Emergency Type *</label>
          <select id="emergencyType" class="form-select" required>
            <option value="">Select Type</option>
            <option value="medical">Medical Emergency</option>
            <option value="rescue">Rescue Required</option>
            <option value="food">Food & Water</option>
            <option value="shelter">Shelter</option>
            <option value="transport">Transportation</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Priority Level *</label>
          <select id="priority" class="form-select" required>
            <option value="">Select Priority</option>
            <option value="urgent">Urgent (Life-threatening)</option>
            <option value="high">High (Critical)</option>
            <option value="medium">Medium (Important)</option>
            <option value="low">Low (Can wait)</option>
          </select>
        </div>
        <div class="col-md-12">
          <label class="form-label">Location *</label>
          <input type="text" id="location" class="form-control" placeholder="City / Address / Landmark" required>
        </div>
        <div class="col-md-12">
          <label class="form-label">Emergency Details *</label>
          <textarea id="description" class="form-control" rows="4" placeholder="Describe your situation in detail" required></textarea>
        </div>
        <div class="col-12 text-center">
          <button type="submit" class="btn btn-danger btn-lg">
            <span id="submitSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
            Submit Emergency Request
          </button>
        </div>
      </form>
      
      <!-- Request Status Section -->
      <div id="requestStatus" class="mt-5" style="display: none;">
        <div class="card">
          <div class="card-header bg-success text-white">
            <h5 class="mb-0">✅ Request Submitted Successfully!</h5>
          </div>
          <div class="card-body">
            <p><strong>Request ID:</strong> <span id="requestId"></span></p>
            <p><strong>Status:</strong> <span class="badge bg-warning">Pending</span></p>
            <p><strong>Submitted at:</strong> <span id="submissionTime"></span></p>
            <p class="text-muted">A volunteer will contact you shortly. Keep your phone nearby!</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="py-3 bg-dark text-white text-center">
    <div class="container">
      <p>&copy; 2025 Jeevan Setu.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    // Check authentication
    function checkAuth() {
      const user = sessionStorage.getItem('user');
      if (!user) {
        window.location.href = 'login.html';
        return false;
      }
      
      const userData = JSON.parse(user);
      if (userData.role !== 'victim') {
        showNotification('Access denied. Victim role required.', 'danger');
        setTimeout(() => window.location.href = 'login.html', 2000);
        return false;
      }
      
      // Show user info
      document.getElementById('userInfo').textContent = `Welcome, ${userData.name}`;
      return true;
    }

    // Logout function
    function logout() {
      sessionStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    // Initialize page
    document.addEventListener('DOMContentLoaded', function() {
      if (!checkAuth()) return;
    });

    // Handle form submission
    document.getElementById('emergencyForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const submitBtn = document.querySelector('button[type="submit"]');
      const spinner = document.getElementById('submitSpinner');
      
      // Show loading state
      submitBtn.disabled = true;
      spinner.classList.remove('d-none');
      
      try {
        // Collect form data
        const requestData = {
          type: document.getElementById('emergencyType').value,
          location: document.getElementById('location').value,
          description: document.getElementById('description').value,
          contact: document.getElementById('victimContact').value,
          name: document.getElementById('victimName').value,
          priority: document.getElementById('priority').value
        };
        
        // Submit to backend
        const response = await api.createRequest(requestData);
        
        if (response.success) {
          // Show success message
          showNotification('Emergency request submitted successfully!', 'success');
          
          // Display request status
          document.getElementById('requestId').textContent = response.data.id;
          document.getElementById('submissionTime').textContent = new Date().toLocaleString();
          document.getElementById('requestStatus').style.display = 'block';
          
          // Reset form
          document.getElementById('emergencyForm').reset();
          
          // Scroll to status
          document.getElementById('requestStatus').scrollIntoView({ behavior: 'smooth' });
        }
      } catch (error) {
        console.error('Error submitting request:', error);
        showNotification('Failed to submit request. Please try again.', 'danger');
      } finally {
        // Hide loading state
        submitBtn.disabled = false;
        spinner.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
